organization: jbuitragoSH
repository: github-bootstrap

project:
  title: GitHub Bootstrap Development

labels:
  - name: bug
    color: d73a4a
    description: Something isn't working

  - name: documentation
    color: "0075CA"
    description: Architecture and development documentation

milestones:
  - title: Sprint 1
    description: Academic Knowledge Core foundation
    due_on: 2026-08-15

fields:
  - name: Component
    type: text

  - name: Story Points
    type: number

  - name: Due Date
    type: date

  - name: Priority
    type: single_select
    options:
      - Low
      - Medium
      - High
      - Critical

  - name: Status
    type: single_select
    options:
      - Backlog
      - Ready
      - In Progress
      - In Review
      - Done

  - name: Sprint
    type: iteration
    configuration:
      duration: 14
      start_date: 2026-08-01
      iterations:
        - title: Sprint 1
        - title: Sprint 2
        - title: Sprint 3

