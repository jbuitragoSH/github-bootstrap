<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>GitHub Bootstrap Login</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', path='/styles.css') }}"
    >
</head>

<body>
    <main class="login-container">
        <section class="login-panel">
            <p class="eyebrow">
                GitHub project infrastructure
            </p>

            <h1>GitHub Bootstrap</h1>

            <p class="description">
                Enter the access password to continue.
            </p>

            {% if error %}
                <div class="login-error">
                    {{ error }}
                </div>
            {% endif %}

            <form
                method="post"
                action="/login"
                class="login-form"
            >
                <label for="password">
                    Password
                </label>

                <input
                    id="password"
                    name="password"
                    type="password"
                    required
                    autofocus
                    autocomplete="current-password"
                >

                <button
                    class="button button-primary"
                    type="submit"
                >
                    Sign in
                </button>
            </form>
        </section>
    </main>
</body>
</html>
